{% extends "base.html" %}

{% block content %}

<h2>User Profile</h2>

<div class="card mb-3">

<div class="card-body">

<h4>{{user.name}}</h4>

<p>{{user.email}}</p>

</div>

</div>


<h3>Your Teams</h3>

<div class="row">

{% for team in teams %}

<div class="col-md-4">

<div class="card mb-3">

<div class="card-body">

<h5>{{team.name}}</h5>

<a href="/team/{{team.id}}" class="btn btn-primary">
View Team
</a>

</div>

</div>

</div>

{% endfor %}

</div>


<h3>Your Submissions</h3>

<table class="table">

<tr>
<th>Project</th>
<th>Score</th>
</tr>

{% for s in submissions %}

<tr>

<td>{{s.project_title}}</td>

<td>{{s.score}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
