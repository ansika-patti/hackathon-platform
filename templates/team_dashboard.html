{% extends "base.html" %}

{% block content %}

<h2>{{team.name}}</h2>

<div class="row">

<div class="col-md-6">

<div class="card mb-3">

<div class="card-body">

<h4>Team Members</h4>

<ul>

{% for m in members %}

<li>{{m.user_email}}</li>

{% endfor %}

</ul>

</div>

</div>

</div>


<div class="col-md-6">

<div class="card mb-3">

<div class="card-body">

<h4>Invite Member</h4>

<form method="POST" action="/invite/{{team.id}}">

<input name="email" class="form-control mb-2" placeholder="Member email">

<button class="btn btn-success">
Invite
</button>

</form>

</div>

</div>

</div>

</div>


<div class="card mt-3">

<div class="card-body text-center">

<a href="/submit/{{team.id}}" class="btn btn-primary">
Submit Project
</a>

<a href="/leaderboard" class="btn btn-dark">
View Leaderboard
</a>

</div>

</div>

{% endblock %}
